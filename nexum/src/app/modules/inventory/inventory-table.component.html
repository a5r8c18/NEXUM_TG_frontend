<div class="p-6 bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  
  <!-- Filtros con Exportación -->
  <div class="mb-6">
    <div class="relative">
      <!-- Exportación en esquina superior derecha -->
      <div class="absolute top-4 right-4 z-10">
        <app-export-component [exportData]="exportData" 
                              (exportComplete)="onExportComplete($event)" />
      </div>
      
      <!-- Filtros -->
      <app-date-filter (filtersChange)="onFiltersChange($event)" 
                        [activeFilters]="activeFilters()" />
    </div>
  </div>
  
  <!-- Tabla de Inventario -->
  <div class="bg-white/80 backdrop-blur-sm rounded-xl border border-slate-200/50 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-700 uppercase tracking-wider">Código</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-700 uppercase tracking-wider">Nombre</th>
            <th class="px-6 py-3 text-center text-xs font-medium text-slate-700 uppercase tracking-wider">Entradas</th>
            <th class="px-6 py-3 text-center text-xs font-medium text-slate-700 uppercase tracking-wider">Salidas</th>
            <th class="px-6 py-3 text-center text-xs font-medium text-slate-700 uppercase tracking-wider">Existencias</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-200">
          @for (item of paginatedItems; track item.codigo) {
            <tr class="hover:bg-slate-50/50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="text-sm font-medium text-slate-900">{{ item.codigo }}</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="text-sm text-slate-700">{{ item.nombre }}</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-center">
                <span class="text-sm text-slate-900 font-medium">{{ item.entradas }}</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-center">
                <span class="text-sm text-slate-900 font-medium">{{ item.salidas }}</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-center">
                <span class="text-sm font-bold {{ getStockClass(item.existencias) }}">{{ item.existencias }}</span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

  <!-- Paginación -->
  @if (paginationConfig.totalPages > 1) {
    <div class="mt-6">
      <app-pagination [config]="paginationConfig" (pageChange)="onPageChange($event)" />
    </div>
  }

  </div>
