<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo y Título -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-light text-white mb-2">NEXUM</h1>
      <p class="text-slate-400 text-sm">Crear cuenta nueva</p>
    </div>

    <!-- Formulario de Registro -->
    <div class="bg-white/10 backdrop-blur-md rounded-2xl border border-slate-700 p-8">
      <form class="space-y-6" (ngSubmit)="onSignup()">
        <!-- Mensaje de Error -->
        @if (errorMessage()) {
          <div class="bg-red-500/10 border border-red-500 text-red-400 px-4 py-3 rounded-lg">
            <p class="text-sm">{{ errorMessage() }}</p>
          </div>
        }

        <!-- Mensaje de Éxito -->
        @if (successMessage()) {
          <div class="bg-green-500/10 border border-green-500 text-green-400 px-4 py-3 rounded-lg">
            <p class="text-sm">{{ successMessage() }}</p>
          </div>
        }

        <!-- Campos de Nombre -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="firstName" class="block text-sm font-medium text-slate-300 mb-2">
              Nombre
            </label>
            <input
              id="firstName"
              type="text"
              class="w-full px-3 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              placeholder="Juan"
              [value]="firstName()"
              (input)="onFirstNameChange($event)"
              required
            />
          </div>
          <div>
            <label for="lastName" class="block text-sm font-medium text-slate-300 mb-2">
              Apellido
            </label>
            <input
              id="lastName"
              type="text"
              class="w-full px-3 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              placeholder="Pérez"
              [value]="lastName()"
              (input)="onLastNameChange($event)"
              required
            />
          </div>
        </div>

        <!-- Campo Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-2">
            Correo Electrónico
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
            </div>
            <input
              id="email"
              type="email"
              class="w-full pl-10 pr-3 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              placeholder="correo@ejemplo.com"
              [value]="email()"
              (input)="onEmailChange($event)"
              required
            />
          </div>
        </div>

        <!-- Campo Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
            Contraseña
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              class="w-full pl-10 pr-12 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              placeholder="••••••••••"
              [value]="password()"
              (input)="onPasswordChange($event)"
              required
            />
            <button
              type="button"
              class="absolute inset-y-0 right-0 pr-3 flex items-center"
              (click)="togglePasswordVisibility()"
            >
              <svg class="h-5 w-5 text-slate-400 hover:text-slate-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                @if (showPassword()) {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                } @else {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-4.242-4.242M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-2.707 3.029m0 0L3 3"></path>
                }
              </svg>
            </button>
          </div>
        </div>

        <!-- Campo Confirmar Password -->
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-slate-300 mb-2">
            Confirmar Contraseña
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <input
              id="confirmPassword"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              class="w-full pl-10 pr-12 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              placeholder="••••••••••"
              [value]="confirmPassword()"
              (input)="onConfirmPasswordChange($event)"
              required
            />
            <button
              type="button"
              class="absolute inset-y-0 right-0 pr-3 flex items-center"
              (click)="toggleConfirmPasswordVisibility()"
            >
              <svg class="h-5 w-5 text-slate-400 hover:text-slate-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                @if (showConfirmPassword()) {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                } @else {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-4.242-4.242M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-2.707 3.029m0 0L3 3"></path>
                }
              </svg>
            </button>
          </div>
        </div>

        <!-- Checkbox Términos -->
        <div class="flex items-start">
          <input
            id="terms"
            type="checkbox"
            class="w-4 h-4 bg-slate-800/50 border-slate-600 rounded text-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-offset-0 focus:ring-offset-slate-900 transition-all duration-200 mt-1"
            [checked]="acceptTerms()"
            (change)="onTermsChange($event)"
          />
          <label for="terms" class="ml-2 block text-sm text-slate-300">
            Acepto los <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">términos y condiciones</a> y la <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">política de privacidad</a>
          </label>
        </div>

        <!-- Botón Registro -->
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:from-blue-600 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <div class="flex items-center justify-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V8C4.582 8.067 4.667 8.154 4.8 8.232a8.8 8.8 0 00-1.517 6.326A8.898 8.898 0 0012 20a8.898 8.898 0 008.717-6.442A8.8 8.8 0 0019.2 8.232C19.333 8.154 19.418 8.067 20 8V8a8 8 0 10-16 0z"></path>
              </svg>
              Creando cuenta...
            </div>
          } @else {
            Crear Cuenta
          }
        </button>
      </form>

      <!-- Enlace a Login -->
      <div class="mt-6 text-center">
        <p class="text-sm text-slate-400">
          ¿Ya tienes cuenta? 
          <button type="button" class="text-blue-400 hover:text-blue-300 transition-colors ml-1" (click)="goToLogin()">
            Inicia sesión
          </button>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center text-slate-500 text-sm">
      <p>&copy; {{ currentYear() }} NEXUM TG. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
