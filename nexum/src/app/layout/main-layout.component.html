<div class="dashboard h-screen bg-slate-50 flex">
  <!-- Sidebar - Oculto para CEO -->
  <app-sidebar *ngIf="shouldShowSidebar()" />
  
  <!-- Main Content -->
  <main class="main-content flex-1 flex flex-col bg-slate-50 overflow-hidden transition-all duration-300 ease-in-out"
        [class.ml-64]="!sidebarCollapsed() && shouldShowSidebar()"
        [class.ml-16]="sidebarCollapsed() && shouldShowSidebar()">
    <!-- Header -->
    <app-header />
    
    <!-- Dynamic Content -->
    <div class="flex-1 overflow-y-auto">
      <router-outlet></router-outlet>
    </div>
    
    <!-- Footer Fixed -->
    <app-footer />
  </main>
</div>
