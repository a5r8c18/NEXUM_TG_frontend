<header class="bg-gradient-to-b from-slate-900 to-slate-800 px-6 py-3 shadow-sm border-b border-slate-700 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <h1 class="text-lg font-light text-white tracking-tight">
      {{ pageTitle }}
    </h1>
    @if (companyName && isMultiCompany) {
      <button (click)="switchCompany()" class="hidden sm:flex items-center gap-1.5 bg-slate-700/50 hover:bg-slate-600/50 border border-slate-600 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg text-xs transition-all duration-200">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
        </svg>
        Cambiar Empresa
      </button>
    }
  </div>

  <div class="flex items-center gap-3">
    <!-- Notifications -->
    <button class="relative p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 7.973 6 9v4.159c0 .538.214 1.055.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
      </svg>
      <div class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></div>
    </button>

    <!-- User Menu -->
    <div class="relative user-menu-container">
      <button (click)="toggleUserMenu()" class="flex items-center gap-2 hover:bg-slate-700/50 rounded-lg p-1.5 pr-3 transition-colors">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full flex items-center justify-center">
          <span class="text-xs font-bold text-white">{{ userInitials }}</span>
        </div>
        <div class="hidden sm:block text-left">
          <p class="text-sm font-medium text-white leading-tight">{{ userName }}</p>
          <p class="text-xs text-slate-400 leading-tight">{{ userRole }}</p>
        </div>
        <svg class="w-4 h-4 text-slate-400 hidden sm:block transition-transform" [class.rotate-180]="showUserMenu()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>

      <!-- Dropdown Menu -->
      @if (showUserMenu()) {
        <div class="absolute right-0 top-full mt-2 w-64 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl shadow-black/30 overflow-hidden z-50">
          <!-- User Info -->
          <div class="px-4 py-3 border-b border-slate-700">
            <p class="text-sm font-medium text-white">{{ userName }}</p>
            <p class="text-xs text-slate-400">{{ userEmail }}</p>
            @if (companyName) {
              <p class="text-xs text-blue-400 mt-1">{{ companyName }}</p>
            }
          </div>

          <!-- Menu Items -->
          <div class="py-1">
            @if (isMultiCompany) {
              <button (click)="switchCompany()" class="w-full text-left px-4 py-2.5 text-sm text-slate-300 hover:bg-slate-700/50 hover:text-white transition-colors flex items-center gap-3">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
                Cambiar Empresa
              </button>
            }
            <button class="w-full text-left px-4 py-2.5 text-sm text-slate-300 hover:bg-slate-700/50 hover:text-white transition-colors flex items-center gap-3">
              <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
              Mi Perfil
            </button>
            <button class="w-full text-left px-4 py-2.5 text-sm text-slate-300 hover:bg-slate-700/50 hover:text-white transition-colors flex items-center gap-3">
              <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
              Configuracion
            </button>
          </div>

          <!-- Logout -->
          <div class="border-t border-slate-700 py-1">
            <button (click)="logout()" class="w-full text-left px-4 py-2.5 text-sm text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors flex items-center gap-3">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
              Cerrar Sesion
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</header>
