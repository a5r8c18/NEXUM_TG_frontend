<header class="bg-gradient-to-b from-slate-900 to-slate-800 px-6 py-4 shadow-sm border-b border-slate-700 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <h1 class="text-2xl font-light text-white tracking-tight">
      {{ pageTitle() }}
    </h1>
  </div>
  
  <div class="flex items-center gap-3">
    <!-- Ícono de Notificaciones -->
    <button class="relative p-2 text-white hover:bg-slate-700/50 rounded-lg transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 7.973 6 9v4.159c0 .538.214 1.055.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
      </svg>
      <!-- Indicador de notificaciones -->
      <div class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></div>
    </button>
    
    <!-- Perfil de Usuario -->
    <div class="relative">
      <div class="w-2 h-2 bg-green-500 rounded-full absolute -top-1 -right-1 border-2 border-slate-800"></div>
      <div class="w-10 h-10 bg-gradient-to-br from-slate-700 to-slate-600 rounded-full flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </div>
    </div>
    <div class="hidden sm:block">
      <p class="text-sm font-medium text-white">{{ userName() }}</p>
      <p class="text-xs text-slate-400">Administrator</p>
    </div>
  </div>
</header>
